<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NexChat — Real-Time Chat</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    /* ─── CSS Variables ──────────────────────────────────────── */
    :root {
      --bg-0: #0a0b0f;
      --bg-1: #111318;
      --bg-2: #181b22;
      --bg-3: #1f2330;
      --bg-hover: #252a38;
      --border: rgba(255,255,255,0.07);
      --accent: #7c5cfc;
      --accent-2: #56cfb2;
      --accent-glow: rgba(124,92,252,0.3);
      --text-1: #f0f2f8;
      --text-2: #8b90a7;
      --text-3: #555a70;
      --danger: #ff5c7a;
      --online: #3dd68c;
      --msg-self: #7c5cfc;
      --radius: 12px;
      --sidebar-w: 240px;
      --transition: 0.18s ease;
    }

    /* ─── Reset ──────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg-0);
      color: var(--text-1);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ─── LOGIN SCREEN ───────────────────────────────────────── */
    #login-screen {
      position: fixed; inset: 0; z-index: 100;
      background: var(--bg-0);
      display: flex; align-items: center; justify-content: center;
      animation: fadeIn 0.5s ease;
    }
    .login-card {
      background: var(--bg-2);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 48px 44px;
      width: 420px;
      box-shadow: 0 40px 80px rgba(0,0,0,0.5), 0 0 0 1px rgba(124,92,252,0.1);
      position: relative; overflow: hidden;
    }
    .login-card::before {
      content: '';
      position: absolute; top: -80px; right: -60px;
      width: 220px; height: 220px;
      background: radial-gradient(circle, rgba(124,92,252,0.25) 0%, transparent 70%);
      pointer-events: none;
    }
    .login-logo {
      font-family: 'Syne', sans-serif;
      font-size: 32px; font-weight: 800;
      background: linear-gradient(135deg, #7c5cfc, #56cfb2);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      margin-bottom: 6px;
    }
    .login-tagline {
      color: var(--text-2); font-size: 14px; margin-bottom: 36px;
    }
    .form-group { margin-bottom: 18px; }
    .form-label {
      display: block; font-size: 12px; font-weight: 500;
      color: var(--text-2); text-transform: uppercase;
      letter-spacing: 0.08em; margin-bottom: 8px;
    }
    .form-input {
      width: 100%; padding: 13px 16px;
      background: var(--bg-3); border: 1px solid var(--border);
      border-radius: 10px; color: var(--text-1);
      font-family: 'DM Sans', sans-serif; font-size: 15px;
      outline: none; transition: border-color var(--transition), box-shadow var(--transition);
    }
    .form-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }
    .room-grid {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 10px; margin-top: 8px;
    }
    .room-option {
      padding: 11px 14px; border-radius: 10px;
      border: 1.5px solid var(--border); background: var(--bg-3);
      cursor: pointer; font-size: 14px; color: var(--text-2);
      transition: all var(--transition); text-align: center;
      font-family: 'DM Sans', sans-serif;
    }
    .room-option:hover { border-color: var(--accent); color: var(--text-1); }
    .room-option.selected {
      border-color: var(--accent); background: rgba(124,92,252,0.15);
      color: var(--text-1); font-weight: 500;
    }
    .btn-join {
      width: 100%; padding: 14px;
      background: linear-gradient(135deg, var(--accent), #5a3fd4);
      border: none; border-radius: 10px; color: #fff;
      font-family: 'Syne', sans-serif; font-size: 15px; font-weight: 700;
      cursor: pointer; margin-top: 8px; letter-spacing: 0.04em;
      transition: opacity var(--transition), transform var(--transition);
      box-shadow: 0 8px 24px rgba(124,92,252,0.35);
    }
    .btn-join:hover { opacity: 0.9; transform: translateY(-1px); }
    .btn-join:active { transform: translateY(0); }
    .error-msg {
      color: var(--danger); font-size: 13px; margin-top: -8px; margin-bottom: 8px;
      display: none;
    }
    .error-msg.show { display: block; }

    /* ─── APP LAYOUT ─────────────────────────────────────────── */
    #app {
      display: none; width: 100vw; height: 100vh;
      flex-direction: row;
    }
    #app.visible { display: flex; }

    /* ─── SIDEBAR ────────────────────────────────────────────── */
    .sidebar {
      width: var(--sidebar-w); background: var(--bg-1);
      border-right: 1px solid var(--border);
      display: flex; flex-direction: column;
      flex-shrink: 0; overflow: hidden;
    }
    .sidebar-header {
      padding: 20px 18px 16px;
      border-bottom: 1px solid var(--border);
    }
    .app-logo {
      font-family: 'Syne', sans-serif; font-size: 20px; font-weight: 800;
      background: linear-gradient(135deg, #7c5cfc, #56cfb2);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .app-tagline { font-size: 11px; color: var(--text-3); margin-top: 2px; }

    .section-label {
      padding: 16px 18px 8px;
      font-size: 11px; font-weight: 600; color: var(--text-3);
      text-transform: uppercase; letter-spacing: 0.1em;
    }
    .room-list { flex: 1; overflow-y: auto; padding: 0 10px 10px; }
    .room-item {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 10px; border-radius: 8px; cursor: pointer;
      font-size: 14px; color: var(--text-2);
      transition: background var(--transition), color var(--transition);
      position: relative;
    }
    .room-item:hover { background: var(--bg-hover); color: var(--text-1); }
    .room-item.active {
      background: rgba(124,92,252,0.18); color: #fff; font-weight: 500;
    }
    .room-item.active::before {
      content: ''; position: absolute; left: -10px; top: 50%; transform: translateY(-50%);
      width: 3px; height: 20px; background: var(--accent); border-radius: 2px;
    }
    .room-hash { color: var(--text-3); font-size: 16px; }
    .room-count {
      margin-left: auto; font-size: 11px; color: var(--text-3);
      background: var(--bg-3); padding: 2px 7px; border-radius: 20px;
    }
    .room-item.active .room-count { background: rgba(124,92,252,0.3); color: var(--accent); }

    /* User info bottom */
    .sidebar-footer {
      padding: 14px 16px;
      border-top: 1px solid var(--border);
      display: flex; align-items: center; gap: 10px;
    }
    .user-avatar {
      width: 34px; height: 34px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; font-weight: 700; color: #fff; flex-shrink: 0;
    }
    .user-info .user-name {
      font-size: 13px; font-weight: 500; color: var(--text-1);
    }
    .user-info .user-status {
      font-size: 11px; color: var(--online); display: flex;
      align-items: center; gap: 4px;
    }
    .user-status::before {
      content: ''; width: 6px; height: 6px; background: var(--online);
      border-radius: 50%; display: inline-block;
    }

    /* ─── MAIN CHAT ───────────────────────────────────────────── */
    .chat-main {
      flex: 1; display: flex; flex-direction: column; overflow: hidden;
      background: var(--bg-0);
    }
    .chat-header {
      padding: 0 24px; height: 58px;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 14px;
      background: var(--bg-1);
    }
    .chat-header-icon { font-size: 20px; color: var(--text-2); }
    .chat-room-name {
      font-family: 'Syne', sans-serif; font-size: 16px; font-weight: 700;
    }
    .chat-header-divider {
      width: 1px; height: 20px; background: var(--border);
    }
    .chat-room-desc { font-size: 13px; color: var(--text-2); }
    .chat-header-right {
      margin-left: auto; display: flex; align-items: center; gap: 14px;
    }
    .online-badge {
      display: flex; align-items: center; gap: 6px;
      font-size: 13px; color: var(--online);
    }
    .online-dot {
      width: 8px; height: 8px; background: var(--online);
      border-radius: 50%; animation: pulse 2s infinite;
    }

    /* ─── MESSAGES ────────────────────────────────────────────── */
    .messages-container {
      flex: 1; overflow-y: auto; padding: 20px 24px;
      display: flex; flex-direction: column; gap: 4px;
      scroll-behavior: smooth;
    }
    .messages-container::-webkit-scrollbar { width: 5px; }
    .messages-container::-webkit-scrollbar-track { background: transparent; }
    .messages-container::-webkit-scrollbar-thumb { background: var(--bg-3); border-radius: 3px; }

    /* System messages */
    .sys-msg {
      text-align: center; font-size: 12px; color: var(--text-3);
      padding: 6px 0; display: flex; align-items: center;
      gap: 10px;
    }
    .sys-msg::before, .sys-msg::after {
      content: ''; flex: 1; height: 1px; background: var(--border);
    }

    /* Chat messages */
    .msg-group { margin-top: 14px; }
    .msg-row {
      display: flex; align-items: flex-start; gap: 12px;
      padding: 3px 0; animation: msgIn 0.2s ease;
    }
    .msg-row.self { flex-direction: row-reverse; }

    .msg-avatar {
      width: 36px; height: 36px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; font-weight: 700; color: #fff;
      flex-shrink: 0; margin-top: 2px;
    }
    .msg-body { max-width: 65%; }
    .msg-row.self .msg-body { align-items: flex-end; display: flex; flex-direction: column; }
    .msg-meta {
      font-size: 12px; color: var(--text-3); margin-bottom: 4px;
      display: flex; align-items: center; gap: 8px;
    }
    .msg-row.self .msg-meta { flex-direction: row-reverse; }
    .msg-username { color: var(--text-2); font-weight: 500; }
    .msg-bubble {
      background: var(--bg-2); padding: 10px 15px;
      border-radius: 16px; border-bottom-left-radius: 4px;
      font-size: 14px; line-height: 1.55; color: var(--text-1);
      word-break: break-word; max-width: 100%;
      border: 1px solid var(--border);
    }
    .msg-row.self .msg-bubble {
      background: var(--msg-self);
      border-color: rgba(124,92,252,0.4);
      border-bottom-left-radius: 16px;
      border-bottom-right-radius: 4px;
    }

    /* ─── TYPING INDICATOR ───────────────────────────────────── */
    .typing-bar {
      height: 26px; padding: 0 24px;
      font-size: 12px; color: var(--text-3);
      display: flex; align-items: center; gap: 8px;
    }
    .typing-dots span {
      display: inline-block; width: 4px; height: 4px;
      background: var(--text-3); border-radius: 50%;
      animation: bounce 1.2s infinite;
    }
    .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.4s; }

    /* ─── INPUT AREA ─────────────────────────────────────────── */
    .chat-input-area {
      padding: 14px 24px 20px;
      background: var(--bg-0);
    }
    .input-box {
      display: flex; align-items: center; gap: 12px;
      background: var(--bg-2); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 10px 16px;
      transition: border-color var(--transition), box-shadow var(--transition);
    }
    .input-box:focus-within {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }
    #msg-input {
      flex: 1; background: none; border: none; outline: none;
      color: var(--text-1); font-family: 'DM Sans', sans-serif;
      font-size: 14px; resize: none; line-height: 1.5; max-height: 120px;
    }
    #msg-input::placeholder { color: var(--text-3); }
    .send-btn {
      width: 36px; height: 36px; border-radius: 9px;
      background: var(--accent); border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; transition: all var(--transition);
      box-shadow: 0 4px 12px rgba(124,92,252,0.4);
    }
    .send-btn:hover { background: #8f6dff; transform: scale(1.05); }
    .send-btn:active { transform: scale(0.95); }
    .send-btn svg { width: 16px; height: 16px; fill: #fff; }

    /* ─── USERS PANEL ────────────────────────────────────────── */
    .users-panel {
      width: 210px; background: var(--bg-1);
      border-left: 1px solid var(--border);
      flex-shrink: 0; overflow-y: auto;
      display: flex; flex-direction: column;
    }
    .users-panel-header {
      padding: 20px 16px 12px;
      font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 700;
      color: var(--text-2); text-transform: uppercase; letter-spacing: 0.07em;
      border-bottom: 1px solid var(--border);
    }
    .users-list { padding: 12px 10px; display: flex; flex-direction: column; gap: 6px; }
    .user-item {
      display: flex; align-items: center; gap: 10px;
      padding: 8px 8px; border-radius: 8px;
      transition: background var(--transition);
    }
    .user-item:hover { background: var(--bg-hover); }
    .user-item-avatar {
      width: 30px; height: 30px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 700; color: #fff; flex-shrink: 0;
    }
    .user-item-name { font-size: 13px; color: var(--text-2); }
    .user-item.is-me .user-item-name { color: var(--accent); font-weight: 500; }
    .online-indicator {
      width: 8px; height: 8px; background: var(--online);
      border-radius: 50%; margin-left: auto; flex-shrink: 0;
    }

    /* ─── ANIMATIONS ─────────────────────────────────────────── */
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes msgIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-5px); }
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }
    .login-card { animation: slideUp 0.4s ease; }

    /* Scrollbar for users panel */
    .users-panel::-webkit-scrollbar { width: 4px; }
    .users-panel::-webkit-scrollbar-thumb { background: var(--bg-3); border-radius: 2px; }

    /* Empty state */
    .empty-state {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      color: var(--text-3); gap: 10px; padding: 40px;
    }
    .empty-state .icon { font-size: 48px; }
    .empty-state p { font-size: 14px; text-align: center; }

    /* Connection status */
    .conn-status {
      position: fixed; bottom: 20px; right: 20px;
      padding: 10px 18px; border-radius: 10px; font-size: 13px;
      z-index: 999; display: none; animation: slideUp 0.3s ease;
    }
    .conn-status.error {
      background: rgba(255,92,122,0.2); color: var(--danger);
      border: 1px solid rgba(255,92,122,0.3); display: block;
    }
    .conn-status.success {
      background: rgba(61,214,140,0.2); color: var(--online);
      border: 1px solid rgba(61,214,140,0.3); display: block;
    }

    /* Responsive for small screens */
    @media (max-width: 768px) {
      .users-panel { display: none; }
      .sidebar { width: 60px; }
      .sidebar-header, .section-label, .room-item span:not(.room-hash),
      .room-count, .user-info, .app-tagline { display: none; }
      .room-item { justify-content: center; padding: 12px; }
      .sidebar-footer { justify-content: center; }
      .app-logo { font-size: 14px; }
    }
  </style>
</head>
<body>

<!-- ─── LOGIN SCREEN ─────────────────────────────────────────────── -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">NexChat</div>
    <div class="login-tagline">Real-time messaging. No noise.</div>

    <div class="form-group">
      <label class="form-label">Your Name</label>
      <input type="text" class="form-input" id="username-input"
             placeholder="e.g. Dhruv" maxlength="20" autocomplete="off" />
      <div class="error-msg" id="name-error">Please enter a valid name (min 2 chars)</div>
    </div>

    <div class="form-group">
      <label class="form-label">Pick a Room</label>
      <div class="room-grid" id="room-picker">
        <div class="room-option selected" data-room="general"># general</div>
        <div class="room-option" data-room="tech"># tech</div>
        <div class="room-option" data-room="random"># random</div>
        <div class="room-option" data-room="gaming"># gaming</div>
      </div>
    </div>

    <button class="btn-join" id="join-btn">Join Chat →</button>
  </div>
</div>

<!-- ─── MAIN APP ──────────────────────────────────────────────────── -->
<div id="app">
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="app-logo">NexChat</div>
      <div class="app-tagline">Real-time messaging</div>
    </div>
    <div class="section-label">Rooms</div>
    <div class="room-list" id="sidebar-rooms">
      <!-- Rooms rendered by JS -->
    </div>
    <div style="flex:1"></div>
    <div class="sidebar-footer">
      <div class="user-avatar" id="my-avatar-sidebar"></div>
      <div class="user-info">
        <div class="user-name" id="my-name-sidebar"></div>
        <div class="user-status">Online</div>
      </div>
    </div>
  </aside>

  <!-- Chat -->
  <main class="chat-main">
    <div class="chat-header">
      <span class="chat-header-icon">#</span>
      <span class="chat-room-name" id="header-room-name">general</span>
      <div class="chat-header-divider"></div>
      <span class="chat-room-desc">Welcome to the room</span>
      <div class="chat-header-right">
        <div class="online-badge">
          <div class="online-dot"></div>
          <span id="online-count">0</span> online
        </div>
      </div>
    </div>

    <div class="messages-container" id="messages-container">
      <div class="empty-state" id="empty-state">
        <div class="icon">💬</div>
        <p>Be the first to say something!</p>
      </div>
    </div>

    <div class="typing-bar" id="typing-bar"></div>

    <div class="chat-input-area">
      <div class="input-box">
        <textarea id="msg-input" rows="1" placeholder="Type a message..."></textarea>
        <button class="send-btn" id="send-btn" title="Send">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
          </svg>
        </button>
      </div>
    </div>
  </main>

  <!-- Users Panel -->
  <aside class="users-panel">
    <div class="users-panel-header">Online — <span id="user-panel-count">0</span></div>
    <div class="users-list" id="users-list"></div>
  </aside>
</div>

<!-- Connection status toast -->
<div class="conn-status" id="conn-status"></div>

<!-- ─── JavaScript ────────────────────────────────────────────────── -->
<script>
  /* ── State ── */
  let ws = null;
  let myUserId = null;
  let myUsername = null;
  let myAvatar = null;
  let currentRoom = 'general';
  let selectedRoom = 'general';
  let typingTimer = null;
  let isTyping = false;
  let typingUsers = {};

  const roomMeta = {
    general: 'For everything and anything',
    tech:    'Dev talk, tools, and geeky stuff',
    random:  'Memes, vibes, whatever',
    gaming:  'Gamers unite 🎮',
  };

  /* ── DOM Refs ── */
  const loginScreen    = document.getElementById('login-screen');
  const app            = document.getElementById('app');
  const usernameInput  = document.getElementById('username-input');
  const nameError      = document.getElementById('name-error');
  const joinBtn        = document.getElementById('join-btn');
  const messagesEl     = document.getElementById('messages-container');
  const emptyState     = document.getElementById('empty-state');
  const msgInput       = document.getElementById('msg-input');
  const sendBtn        = document.getElementById('send-btn');
  const typingBar      = document.getElementById('typing-bar');
  const onlineCount    = document.getElementById('online-count');
  const userPanelCount = document.getElementById('user-panel-count');
  const usersList      = document.getElementById('users-list');
  const headerRoomName = document.getElementById('header-room-name');
  const sidebarRooms   = document.getElementById('sidebar-rooms');
  const myAvatarEl     = document.getElementById('my-avatar-sidebar');
  const myNameEl       = document.getElementById('my-name-sidebar');
  const connStatus     = document.getElementById('conn-status');

  /* ── Avatar Color ── */
  function avatarColor(username) {
    const colors = ['#FF6B6B','#4ECDC4','#45B7D1','#96CEB4','#FFEAA7',
                    '#DDA0DD','#98D8C8','#F7DC6F','#BB8FCE','#82E0AA'];
    let h = 0;
    for (let c of username) h = (h * 31 + c.charCodeAt(0)) % colors.length;
    return colors[Math.abs(h)];
  }

  function avatarInitial(name) { return name.charAt(0).toUpperCase(); }

  /* ── Room Picker (login) ── */
  document.querySelectorAll('.room-option').forEach(opt => {
    opt.addEventListener('click', () => {
      document.querySelectorAll('.room-option').forEach(o => o.classList.remove('selected'));
      opt.classList.add('selected');
      selectedRoom = opt.dataset.room;
    });
  });

  /* ── Join Button ── */
  joinBtn.addEventListener('click', joinChat);
  usernameInput.addEventListener('keydown', e => { if (e.key === 'Enter') joinChat(); });

  function joinChat() {
    const name = usernameInput.value.trim();
    if (name.length < 2) {
      nameError.classList.add('show');
      usernameInput.focus();
      return;
    }
    nameError.classList.remove('show');
    myUsername = name;
    myAvatar   = avatarColor(name);

    initWebSocket();
  }

  /* ── WebSocket ── */
  function initWebSocket() {
    const proto = location.protocol === 'https:' ? 'wss' : 'ws';
    ws = new WebSocket(`${proto}://${location.host}`);

    ws.onopen = () => {
      showStatus('Connected!', 'success');
      ws.send(JSON.stringify({
        type: 'JOIN',
        username: myUsername,
        roomId: selectedRoom,
        avatar: myAvatar,
      }));
    };

    ws.onmessage = (e) => {
      const msg = JSON.parse(e.data);
      handleMessage(msg);
    };

    ws.onclose = () => {
      showStatus('Disconnected. Refresh to reconnect.', 'error');
    };

    ws.onerror = () => {
      showStatus('Connection error!', 'error');
    };
  }

  /* ── Message Handler ── */
  function handleMessage(msg) {
    switch (msg.type) {

      case 'ROOM_JOINED':
        myUserId    = msg.userId;
        currentRoom = msg.roomId;
        loginScreen.style.display = 'none';
        app.classList.add('visible');
        renderSidebar();
        updateRoomHeader(msg.roomId);
        clearMessages();
        msg.history.forEach(addMessageToUI);
        updateUsers(msg.users);
        scrollToBottom();
        break;

      case 'MESSAGE':
        emptyState.style.display = 'none';
        addMessageToUI(msg);
        scrollToBottom();
        // Clear typing for this user
        delete typingUsers[msg.userId];
        renderTyping();
        break;

      case 'USER_JOINED':
        if (msg.roomId === currentRoom) {
          addSysMessage(`${msg.username} joined the room`);
          updateUsers(msg.users);
        }
        refreshRoomCount(msg.roomId, msg.users.length);
        break;

      case 'USER_LEFT':
        if (msg.roomId === currentRoom) {
          addSysMessage(`${msg.username} left the room`);
          updateUsers(msg.users);
          delete typingUsers[msg.userId];
          renderTyping();
        }
        refreshRoomCount(msg.roomId, msg.users.length);
        break;

      case 'TYPING':
        if (msg.roomId === currentRoom) {
          if (msg.isTyping) typingUsers[msg.userId] = msg.username;
          else delete typingUsers[msg.userId];
          renderTyping();
        }
        break;

      case 'ERROR':
        showStatus(msg.message, 'error');
        break;
    }
  }

  /* ── Render Sidebar ── */
  function renderSidebar() {
    // My info
    myAvatarEl.style.background = myAvatar;
    myAvatarEl.textContent = avatarInitial(myUsername);
    myNameEl.textContent = myUsername;

    // Rooms
    sidebarRooms.innerHTML = '';
    Object.entries(roomMeta).forEach(([id, desc]) => {
      const div = document.createElement('div');
      div.className = 'room-item' + (id === currentRoom ? ' active' : '');
      div.dataset.room = id;
      div.innerHTML = `
        <span class="room-hash">#</span>
        <span>${id}</span>
        <span class="room-count" id="count-${id}">0</span>
      `;
      div.addEventListener('click', () => switchRoom(id));
      sidebarRooms.appendChild(div);
    });

    // Fetch room counts
    fetch('/api/rooms').then(r => r.json()).then(rooms => {
      rooms.forEach(r => {
        const el = document.getElementById(`count-${r.id}`);
        if (el) el.textContent = r.onlineCount;
      });
    }).catch(() => {});
  }

  function refreshRoomCount(roomId, count) {
    const el = document.getElementById(`count-${roomId}`);
    if (el) el.textContent = count;
  }

  /* ── Switch Room ── */
  function switchRoom(roomId) {
    if (roomId === currentRoom) return;
    ws.send(JSON.stringify({ type: 'JOIN', username: myUsername, roomId, avatar: myAvatar }));
  }

  /* ── Update Room Header ── */
  function updateRoomHeader(roomId) {
    headerRoomName.textContent = roomId;
    document.querySelector('.chat-room-desc').textContent = roomMeta[roomId] || '';
    document.querySelectorAll('.room-item').forEach(el => {
      el.classList.toggle('active', el.dataset.room === roomId);
    });
  }

  /* ── Clear Messages ── */
  function clearMessages() {
    messagesEl.innerHTML = '';
    const es = document.createElement('div');
    es.className = 'empty-state'; es.id = 'empty-state';
    es.innerHTML = `<div class="icon">💬</div><p>Be the first to say something!</p>`;
    messagesEl.appendChild(es);
    typingUsers = {};
    renderTyping();
  }

  /* ── Add Message to UI ── */
  let lastMsgUser = null;

  function addMessageToUI(msg) {
    // Hide empty state
    const es = document.getElementById('empty-state');
    if (es) es.style.display = 'none';

    const isSelf = msg.userId === myUserId;
    const row = document.createElement('div');
    row.className = `msg-row${isSelf ? ' self' : ''}`;

    const avatarColor = msg.avatar || '#7c5cfc';
    const initial     = avatarInitial(msg.username);
    const timeStr     = formatTime(msg.timestamp);

    row.innerHTML = `
      <div class="msg-avatar" style="background:${avatarColor}">${initial}</div>
      <div class="msg-body">
        <div class="msg-meta">
          <span class="msg-username">${escapeHTML(msg.username)}</span>
          <span>${timeStr}</span>
        </div>
        <div class="msg-bubble">${escapeHTML(msg.content)}</div>
      </div>
    `;
    messagesEl.appendChild(row);
  }

  /* ── Add System Message ── */
  function addSysMessage(text) {
    const div = document.createElement('div');
    div.className = 'sys-msg';
    div.textContent = text;
    messagesEl.appendChild(div);
    scrollToBottom();
  }

  /* ── Update Users Panel ── */
  function updateUsers(users) {
    onlineCount.textContent    = users.length;
    userPanelCount.textContent = users.length;
    usersList.innerHTML = '';
    users.forEach(u => {
      const div = document.createElement('div');
      div.className = `user-item${u.id === myUserId ? ' is-me' : ''}`;
      const color = u.avatar || avatarColor(u.username);
      div.innerHTML = `
        <div class="user-item-avatar" style="background:${color}">${avatarInitial(u.username)}</div>
        <span class="user-item-name">${escapeHTML(u.username)}${u.id === myUserId ? ' (you)' : ''}</span>
        <div class="online-indicator"></div>
      `;
      usersList.appendChild(div);
    });
  }

  /* ── Typing ── */
  function renderTyping() {
    const names = Object.values(typingUsers);
    if (names.length === 0) { typingBar.innerHTML = ''; return; }
    const text = names.length === 1
      ? `${names[0]} is typing`
      : `${names.slice(0,-1).join(', ')} and ${names[names.length-1]} are typing`;
    typingBar.innerHTML = `
      <div class="typing-dots"><span></span><span></span><span></span></div>
      ${escapeHTML(text)}...
    `;
  }

  /* ── Send Message ── */
  sendBtn.addEventListener('click', sendMessage);
  msgInput.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  msgInput.addEventListener('input', () => {
    // Auto-resize
    msgInput.style.height = 'auto';
    msgInput.style.height = Math.min(msgInput.scrollHeight, 120) + 'px';
    // Typing indicator
    if (!isTyping) {
      isTyping = true;
      ws && ws.send(JSON.stringify({ type: 'TYPING', isTyping: true }));
    }
    clearTimeout(typingTimer);
    typingTimer = setTimeout(() => {
      isTyping = false;
      ws && ws.send(JSON.stringify({ type: 'TYPING', isTyping: false }));
    }, 1500);
  });

  function sendMessage() {
    const content = msgInput.value.trim();
    if (!content || !ws || ws.readyState !== WebSocket.OPEN) return;
    ws.send(JSON.stringify({ type: 'SEND_MESSAGE', content }));
    msgInput.value = '';
    msgInput.style.height = 'auto';
    isTyping = false;
    clearTimeout(typingTimer);
    ws.send(JSON.stringify({ type: 'TYPING', isTyping: false }));
  }

  /* ── Helpers ── */
  function scrollToBottom() {
    setTimeout(() => { messagesEl.scrollTop = messagesEl.scrollHeight; }, 60);
  }

  function formatTime(ts) {
    const d = new Date(ts);
    return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  }

  function escapeHTML(str) {
    const div = document.createElement('div');
    div.appendChild(document.createTextNode(str));
    return div.innerHTML;
  }

  function showStatus(msg, type) {
    connStatus.textContent = msg;
    connStatus.className = `conn-status ${type}`;
    setTimeout(() => { connStatus.className = 'conn-status'; }, 3500);
  }

  // Focus username on load
  usernameInput.focus();
</script>
</body>
</html>
